name: primeira-pipeline
description: "Essa é minha primeira pipeline, vai dar certo"
on:
  push:
    branches: ["main"]
  workflow_dispatch:
jobs:
  primeiro-job:
    name: "meu primeiro Job"
    runs-on: ubuntu-latest
    steps:
      - name: "Minha primeira action"
        run: echo "Hello, World !"
      - name: "Minha segunda ação"
        run: |
          echo "Você criou o seu primeiro Workflow" 
          echo "Parabéns, está tudo funcional !"
      - name: "Script Python"
        run: |
          variavel = "Hello, World" 
          print(variavel)
        shell: python
  segundo-job:
    name: "instalação do ambiente NodeJS"
    runs-on: ubuntu-latest
    steps:
      - name: "Verificando versão atual do NodeJS"
        run: node --version
      
      - name: "Definição da versão do NodeJS"
        uses: actions/setup-node@v6
        with: 
          node-version: '24.14.0'
      
      - name: "Verificando versão do NodeJS depois de mudar a versão com a Action"
        run: node --version
